<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#5C4E78"/>
  <!-- Horizon -->
  <line x1="4" y1="20" x2="28" y2="20" stroke="#C4B5D4" stroke-width="1.5"/>
  <!-- Sprig left -->
  <line x1="9" y1="20" x2="9" y2="10" stroke="#C4B5D4" stroke-width="1.1"/>
  <circle cx="9"  cy="9"  r="1.4" fill="#C4B5D4"/>
  <circle cx="6"  cy="12" r="1.1" fill="#C4B5D4"/>
  <circle cx="12" cy="12" r="1.1" fill="#C4B5D4"/>
  <!-- Sprig center (tall) -->
  <line x1="16" y1="20" x2="16" y2="7" stroke="#EDE8F3" stroke-width="1.3"/>
  <circle cx="16" cy="6"  r="1.6" fill="#EDE8F3"/>
  <circle cx="13" cy="9"  r="1.2" fill="#EDE8F3"/>
  <circle cx="19" cy="9"  r="1.2" fill="#EDE8F3"/>
  <circle cx="14" cy="13" r="1.1" fill="#EDE8F3"/>
  <circle cx="18" cy="13" r="1.1" fill="#EDE8F3"/>
  <!-- Sprig right -->
  <line x1="23" y1="20" x2="23" y2="10" stroke="#C4B5D4" stroke-width="1.1"/>
  <circle cx="23" cy="9"  r="1.4" fill="#C4B5D4"/>
  <circle cx="20" cy="12" r="1.1" fill="#C4B5D4"/>
  <circle cx="26" cy="12" r="1.1" fill="#C4B5D4"/>
</svg>
